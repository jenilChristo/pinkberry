services:
  postgres:
    image: postgres:15
    container_name: babychloe-db
    environment:
      POSTGRES_DB: babychloe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: babychloe-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
